name: Daily Tech News Automation

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for committing changes back to the repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate News Articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate daily tech news articles" && git push)
